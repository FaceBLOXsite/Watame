<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>...</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Change to 'cover' if you want it to fill the screen */
        }
    </style>
</head>
<body>
    <video autoplay muted loop playsinline>
        <source src="1995C737-BFC0-44F2-9031-D57BA00F2AE00704_195713.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <script>
        const video = document.querySelector("video");

        // Attempt to play immediately
        video.play().catch(() => {
            // If autoplay is blocked, play after the first user interaction
            document.addEventListener("click", () => video.play(), { once: true });
            document.addEventListener("touchstart", () => video.play(), { once: true });
        });
    </script>
</body>
</html>

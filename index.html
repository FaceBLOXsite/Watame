<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Spend 1 Billion Robux</title>

<style>
body {
    background: #0f0f0f;
    color: white;
    font-family: Arial;
    text-align: center;
}

h1 { margin-top: 20px; }

#balance {
    font-size: 28px;
    color: #00ff9d;
}

.grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 20px;
}

.card {
    background: #1c1c1c;
    margin: 10px;
    padding: 10px;
    width: 180px;
    border-radius: 10px;
}

.card img {
    width: 150px;
    height: 150px;
    border-radius: 8px;
}

button {
    width: 100%;
    padding: 6px;
    margin-top: 5px;
    background: #00ff9d;
    border: none;
    cursor: pointer;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>💸 Spend 1 Billion Robux</h1>
<div id="balance">Loading...</div>

<div class="grid" id="shop"></div>

<script>
let balance = 1000000000;
let items = [];

// 🔥 Rolimons API (live limited data)
const API = "https://api.rolimons.com/items/v1/itemdetails";

// Roblox thumbnail API
function thumb(id) {
    return `https://www.roblox.com/asset-thumbnail/image?assetId=${id}&width=150&height=150&format=png`;
}

async function loadItems() {
    const res = await fetch(API);
    const data = await res.json();

    // data.items = {id: [name, value, rap, ...]}
    const raw = data.items;

    let count = 0;

    for (let id in raw) {
        if (count++ > 30) break; // limit items for performance

        let item = raw[id];

        items.push({
            id: id,
            name: item[0],
            value: item[4] || item[2] || 0,
            img: thumb(id)
        });
    }

    render();
}

function render() {
    const shop = document.getElementById("shop");
    shop.innerHTML = "";

    items.forEach((item, i) => {
        shop.innerHTML += `
        <div class="card">
            <img src="${item.img}">
            <h3>${item.name}</h3>
            <p>${item.value.toLocaleString()} R$</p>
            <button onclick="buy(${i})">Buy</button>
        </div>
        `;
    });

    document.getElementById("balance").innerText =
        "Balance: " + balance.toLocaleString() + " Robux";
}

function buy(i) {
    let price = items[i].value;

    if (balance >= price) {
        balance -= price;
        render();
    } else {
        alert("Not enough Robux!");
    }
}

loadItems();
</script>

</body>
</html>

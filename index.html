<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video</title>
<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: black;
}
video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
</style>
</head>
<body>

<video id="video" autoplay loop playsinline>
    <source src="1995C737-BFC0-44F2-9031-D57BA00F2AE00704_195713.mp4" type="video/mp4">
</video>

<script>
const video = document.getElementById("video");

video.play().catch(() => {
    document.body.innerHTML = `
        <div style="
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:sans-serif;
            font-size:2rem;
            cursor:pointer;
        ">
            Tap anywhere to play video
        </div>`;

    document.body.addEventListener("click", () => {
        document.body.innerHTML = "";
        document.body.appendChild(video);
        video.play();
    }, { once: true });
});
</script>

</body>
</html>
